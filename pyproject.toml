[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]
ignore = [
    "E501",   # line too long — enforced by line-length, not as error
    "UP007",  # Use X | Y for type annotations — Django 4 compat
]
per-file-ignores = { "*/migrations/*.py" = ["E501", "F401"] }

[tool.ruff.lint.isort]
known-first-party = ["schedule", "streamsync"]
